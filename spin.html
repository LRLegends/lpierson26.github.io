<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spin to Win — Venmo Only</title>

<style>
:root{
  --red:#dc2626;
  --blue:#1d4ed8;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --card:#f8fafc;
  --good:#059669;
  --bad:#dc2626;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:linear-gradient(180deg,rgba(29,78,216,.06),rgba(220,38,38,.03));
  color:var(--text);
}
header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:14px;
}
.brandBar{
  height:4px;
  background:linear-gradient(90deg,var(--blue),var(--white),var(--red));
  border-radius:999px;
  margin-bottom:10px;
}
.wrap{max-width:980px;margin:0 auto}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.between{justify-content:space-between}
.logo{height:44px;object-fit:contain}
main{padding:14px}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}
.grid3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
@media(max-width:900px){.grid3{grid-template-columns:1fr}}

.pill{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
}
.pill.good{color:var(--good)}
.pill.bad{color:var(--bad)}
.pill.blue{color:var(--blue)}
.title{font-weight:900}
.sub{font-size:13px;color:var(--muted)}

button,a.btn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  font-weight:800;
  cursor:pointer;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  display:inline-block;
}
button.secondary{
  background:#fff;
  color:var(--text);
  border:1px solid var(--border);
}
button:disabled{opacity:.5; cursor:not-allowed}

.photos{display:flex;justify-content:center;margin-top:10px}
.photo{
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}
.photo img{
  width:100%;
  max-width:320px;
  height:180px;
  object-fit:contain;
  display:block;
}

.progressWrap{
  margin-top:10px;
  height:10px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--red));
  width:0%;
}

.hidden{display:none}
.notice{
  margin-top:10px;
  border:1px dashed var(--border);
  border-radius:12px;
  padding:10px;
  font-size:13px;
  color:var(--muted);
  background:#fff;
}

label{display:block;margin:10px 0 6px;font-size:12px;color:var(--muted)}
input,select{
  width:100%;
  padding:10px 10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  font-size:14px;
}
.hr{height:1px;background:var(--border);margin:12px 0}
.small{font-size:12px;color:var(--muted)}

.payPanel{
  margin-top:12px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}
.payRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-top:10px;
}
.payRow .btn.secondaryLink{
  background:#fff;
  color:var(--text);
  border:1px solid var(--border);
}
.codeBox{
  margin-top:10px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#f8fafc;
  font-family:monospace;
  font-size:12px;
  word-break:break-word;
}
</style>
</head>

<body>

<header>
  <div class="wrap">
    <div class="brandBar"></div>
    <div class="row between">
      <div class="row">
        <a href="index.html">
          <img src="logo.webp" class="logo" alt="Locker Room Legends">
        </a>
        <div>
          <div class="title">Spin to Win</div>
          <div class="sub"><strong>Venmo only.</strong> Sign up → pay Venmo.</div>
        </div>
      </div>
      <span id="globalStatus" class="pill">Loading…</span>
    </div>
  </div>
</header>

<main class="wrap">

<section id="pagePick" class="card">
  <div class="row between">
    <div>
      <div class="title">Pick a Spin</div>
      <div class="sub">Choose an option to sign up.</div>
    </div>
  </div>

  <div id="spinCards" class="grid3" style="margin-top:12px"></div>
  <div id="pickMsg" class="notice hidden"></div>
</section>

<section id="pageSignup" class="card hidden">
  <div class="row between">
    <div>
      <div class="title" id="signupTitle">Sign up</div>
      <div class="sub" id="signupDesc"></div>
    </div>
    <button id="btnBack" class="secondary">← Back</button>
  </div>

  <div class="row" style="margin-top:10px;gap:10px">
    <span class="pill blue" id="signupPrice">$0</span>
    <span class="pill" id="signupFill">0/0 filled</span>
    <span class="pill" id="signupSpots">0 spots left</span>
    <span class="pill" id="signupStatus">Open</span>
  </div>

  <div class="progressWrap"><div class="bar" id="signupBar"></div></div>

  <div class="photos" id="signupPhotoWrap"></div>

  <div class="hr"></div>

  <div class="row">
    <div style="flex:1">
      <label>Name</label>
      <input id="name" placeholder="Your name">
    </div>
    <div style="flex:1">
      <label>Phone</label>
      <input id="phone" placeholder="(###) ###-####">
    </div>
  </div>

  <div class="row">
    <div style="flex:1">
      <label>Email</label>
      <input id="email" placeholder="you@email.com">
    </div>
    <div style="flex:1">
      <label>Venmo username</label>
      <input id="venmo" placeholder="@yourVenmo">
    </div>
  </div>

  <div>
    <label>Pick your wheel number (1–24)</label>
    <select id="spinNumber"></select>
  </div>

  <div>
    <label>Selection (1–3)</label>
    <select id="selection">
      <option value="">Select…</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
    </select>
  </div>

  <button id="btnSubmit" style="margin-top:12px;width:100%">Submit Entry</button>

  <div id="msg" class="notice hidden"></div>

  <div id="payNowPanel" class="payPanel hidden">
    <div class="row between">
      <div>
        <div class="title" style="font-size:16px">Pay now</div>
        <div class="sub">Tap to pay immediately in Venmo.</div>
      </div>
      <span class="pill blue" id="payAmountPill">$0.00</span>
    </div>

    <div class="codeBox">
      <div class="small">Use this note in Venmo:</div>
      <div id="payNoteText"></div>
    </div>

    <div class="payRow">
      <a id="venmoPayBtn" class="btn" href="#">Open Venmo to Pay</a>
      <button id="btnCopyNote" class="secondary">Copy note</button>
      <a id="venmoFallbackLink" class="btn secondaryLink" href="#" target="_blank">Venmo web fallback</a>
    </div>
  </div>

</section>

</main>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxBtWVR8Xvf-jDys3hiVxyCuKSKGoJBKyz9Fc7jdDrcsBT8im84eEfWbX4tZi4eyspJ_w/exec";
const RECEIVER_VENMO="lockerroomcr";

const pagePick=document.getElementById("pagePick");
const pageSignup=document.getElementById("pageSignup");
const spinCards=document.getElementById("spinCards");
const globalStatus=document.getElementById("globalStatus");

const btnBack=document.getElementById("btnBack");
const btnSubmit=document.getElementById("btnSubmit");

const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const emailEl=document.getElementById("email");
const venmoEl=document.getElementById("venmo");
const spinNumberEl=document.getElementById("spinNumber");
const selectionEl=document.getElementById("selection");

const msg=document.getElementById("msg");
const payNowPanel=document.getElementById("payNowPanel");
const payNoteText=document.getElementById("payNoteText");
const payAmountPill=document.getElementById("payAmountPill");
const venmoPayBtn=document.getElementById("venmoPayBtn");
const venmoFallbackLink=document.getElementById("venmoFallbackLink");
const btnCopyNote=document.getElementById("btnCopyNote");

const state={spins:[],selectedSpinKey:null};

async function apiGetSpins(){
  const r=await fetch(API_URL);
  const d=await r.json();
  return d.spins||[];
}

function money(n){return Number(n||0).toFixed(2)}

function buildVenmoDeepLink({amount,note}){
  return `venmo://paycharge?txn=pay&recipients=${RECEIVER_VENMO}&amount=${amount}&note=${encodeURIComponent(note)}`;
}

function buildVenmoFallbackProfile(){
  return `https://venmo.com/u/${RECEIVER_VENMO}`;
}

function showPayNow({amount,note}){
  payAmountPill.textContent="$"+amount;
  payNoteText.textContent=note;
  venmoPayBtn.href=buildVenmoDeepLink({amount,note});
  venmoFallbackLink.href=buildVenmoFallbackProfile();
  payNowPanel.classList.remove("hidden");
}

btnCopyNote.onclick=()=>{
  navigator.clipboard.writeText(payNoteText.textContent);
  btnCopyNote.textContent="Copied";
};

async function submitEntry(){
  const amount="10.00";
  const note=`SpinToWin Entry`;
  showPayNow({amount,note});
}

btnSubmit.onclick=submitEntry;

(async function init(){
  try{
    state.spins=await apiGetSpins();
    globalStatus.textContent="Open";
    globalStatus.className="pill good";
  }catch{
    globalStatus.textContent="Error";
    globalStatus.className="pill bad";
  }
})();
</script>

</body>
</html>
